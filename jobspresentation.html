<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Doctor Introduction</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            border: 3px solid #00a8cc;
        }
        h2 { color: #007086; margin-bottom: 20px; }
        #speechText { 
            font-size: 1.5rem; 
            line-height: 2; 
            color: #333; 
            margin-bottom: 25px; 
            text-align: center;
        }
        /* Boyama (Vurgu) Efekti */
        .highlight {
            background-color: yellow;
            font-weight: bold;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        button {
            background-color: #00a8cc;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 I am a Doctor!</h2>
    <div id="speechText">
        </div>
    
    <button id="playBtn" onclick="speak()">
        <span style="margin-right:10px;">🔊</span> Start Karaoke
    </button>
</div>

<script>
    const text = "Hello! My name is Meryem. I am a children's doctor. I work at a hospital. I wear a white coat. I help ill kids. I love my job. Thank you!";
    const container = document.getElementById('speechText');
    const playBtn = document.getElementById('playBtn');

    // Metni kelimelere bölüp span içine alalım (HTML yapısını korumak için)
    const words = text.split(" ");
    container.innerHTML = words.map(word => `<span>${word}</span>`).join(" ");

    function speak() {
        // Daha önceki seslendirmeyi durdur
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.7; // 4. sınıf için hızı biraz daha düşürdüm

        const spans = container.querySelectorAll('span');
        
        // Ses başladığında butonu pasif yap
        utterance.onstart = () => {
            playBtn.disabled = true;
        };

        // Kelime değiştikçe çalışacak olan fonksiyon (Karaoke kalbi)
        utterance.onboundary = (event) => {
            if (event.name === 'word') {
                // Tüm vurguları temizle
                spans.forEach(s => s.classList.remove('highlight'));
                
                // Okunan kelimenin indexini bul ve vurgula
                // SpeechSynthesisUtterance charIndex ile karakter sırasını verir
                let charCount = 0;
                for (let i = 0; i < words.length; i++) {
                    if (charCount >= event.charIndex) {
                        spans[i].classList.add('highlight');
                        break;
                    }
                    charCount += words[i].length + 1; // +1 boşluk için
                }
            }
        };

        // Bittiğinde vurguyu kaldır ve butonu aç
        utterance.onend = () => {
            spans.forEach(s => s.classList.remove('highlight'));
            playBtn.disabled = false;
        };

        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
