<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Doctor Introduction</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            border: 3px solid #00a8cc;
        }
        h2 { color: #007086; margin-bottom: 20px; }
        p { font-size: 1.2rem; line-height: 1.6; color: #333; margin-bottom: 25px; }
        button {
            background-color: #00a8cc;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        button:hover {
            background-color: #007086;
            transform: scale(1.05);
        }
        .icon { margin-right: 10px; font-size: 1.4rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 I am a Doctor!</h2>
    <p id="textToSpeak">
        Hello! <br>
        My name is Mustafa. <br>
        I am a children's doctor. <br>
        I work at a hospital. <br>
        I wear a white coat. <br>
        I help sick kids. <br>
        I love my job. <br>
        Thank you!
    </p>
    
    <button onclick="speak()">
        <span class="icon">🔊</span> Listen & Repeat
    </button>
</div>

<script>
    function speak() {
        const text = document.getElementById('textToSpeak').innerText;
        const utterance = new SpeechSynthesisUtterance(text);
        
        // Dil ayarı: İngilizce (Amerikan veya İngiliz seçilebilir)
        utterance.lang = 'en-US';
        
        // Hız ayarı: 0.8 (Biraz yavaşlattım ki öğrenci rahat anlasın)
        utterance.rate = 0.8; 
        
        // Ses perdesi
        utterance.pitch = 1;

        // Tarayıcıdaki seslendirmeyi başlat
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
